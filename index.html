<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Playground Finder | Spielplatz Entdecker</title>
    <meta name="description" content="Find the next playground in Germany with turn-by-turn directions.">
    
    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&display=swap" rel="stylesheet">
    
    <!-- MapLibre GL JS & CSS -->
    <link href="https://unpkg.com/maplibre-gl@latest/dist/maplibre-gl.css" rel="stylesheet" />
    <script src="https://unpkg.com/maplibre-gl@latest/dist/maplibre-gl.js"></script>
    
    <link rel="stylesheet" href="style.css">
    
    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>
    
    <!-- Supabase -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    
    <!-- React & Babel Standalone -->
    <script crossorigin src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
</head>
<body>
    <div id="root"></div>
    <script type="text/babel">
        const { useState, useEffect, useRef } = React;

        const SUPABASE_URL = 'https://qjixsrqxoqqwehmztwgt.supabase.co';
        const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InFqaXhzcnF4b3Fxd2VobXp0d2d0Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzY0NjYyMzMsImV4cCI6MjA5MjA0MjIzM30.kvbM3dNMRT35evjZ6v9nyQdtB0tZa6TIfFXV4jZ9_iI';
        const db = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        const AuthModal = ({ onClose }) => {
            const [email, setEmail] = useState('');
            const [password, setPassword] = useState('');
            const [isSignUp, setIsSignUp] = useState(false);
            const [error, setError] = useState(null);

            const handleAuth = async (e) => {
                e.preventDefault();
                setError(null);
                const { error } = isSignUp 
                    ? await db.auth.signUp({ email, password })
                    : await db.auth.signInWithPassword({ email, password });
                
                if (error) setError(error.message);
                else onClose();
            };

            return (
                <div className="modal-overlay" style={{ position: 'fixed', top: 0, left: 0, right: 0, bottom: 0, background: 'rgba(0,0,0,0.5)', zIndex: 1000, display: 'flex', alignItems: 'center', justifyContent: 'center' }}>
                    <div className="modal-content" style={{ background: 'white', padding: '32px', borderRadius: '24px', width: '90%', maxWidth: '400px' }}>
                        <h2 className="mb-2">{isSignUp ? 'Erstelle Konto' : 'Login'}</h2>
                        <form onSubmit={handleAuth}>
                            <input className="btn btn-secondary" style={{ width: '100%', marginBottom: '12px', textAlign: 'left' }} type="email" placeholder="Email" value={email} onChange={e => setEmail(e.target.value)} required />
                            <input className="btn btn-secondary" style={{ width: '100%', marginBottom: '12px', textAlign: 'left' }} type="password" placeholder="Passwort" value={password} onChange={e => setPassword(e.target.value)} required />
                            {error && <p style={{ color: 'red', fontSize: '0.8rem', marginBottom: '12px' }}>{error}</p>}
                            <button className="btn btn-primary" style={{ width: '100%' }} type="submit">{isSignUp ? 'Registrieren' : 'Anmelden'}</button>
                        </form>
                        <p style={{ marginTop: '16px', textAlign: 'center', cursor: 'pointer', color: '#4A90E2' }} onClick={() => setIsSignUp(!isSignUp)}>
                            {isSignUp ? 'Schon ein Konto? Login' : 'Neu hier? Account erstellen'}
                        </p>
                        <button className="btn btn-secondary mt-4" style={{ width: '100%' }} onClick={onClose}>Abbrechen</button>
                    </div>
                </div>
            );
        };

        const App = () => {
            const mapRef = useRef(null);
            const mapInstance = useRef(null);
            const [selectedPlayground, setSelectedPlayground] = useState(null);
            const [loading, setLoading] = useState(false);
            const [userLocation, setUserLocation] = useState(null);
            const [directions, setDirections] = useState(null);
            const [user, setUser] = useState(null);
            const [showAuth, setShowAuth] = useState(false);
            const [playgroundPhotos, setPlaygroundPhotos] = useState([]);

            const [locationError, setLocationError] = useState(null);

            const ORS_API_KEY = 'eyJvcmciOiI1YjNjZTM1OTc4NTExMTAwMDFjZjYyNDgiLCJpZCI6Ijk5MGYwYTYyYjY2MjRiNzJhOTE1ZjM4ZDkwODA4NmJjIiwiaCI6Im11cm11cjY0In0=';

            const detectLocation = (isFirstLoad = false) => {
                if (!navigator.geolocation) {
                    setLocationError("Geolokalisierung wird von Ihrem Browser nicht unterstützt.");
                    return;
                }

                setLoading(true);
                setLocationError(null);

                const options = {
                    enableHighAccuracy: true,
                    timeout: 10000,
                    maximumAge: 0
                };

                navigator.geolocation.getCurrentPosition(
                    (pos) => {
                        const { longitude, latitude } = pos.coords;
                        setUserLocation([longitude, latitude]);
                        
                        if (mapInstance.current) {
                            mapInstance.current.flyTo({ 
                                center: [longitude, latitude], 
                                zoom: 16, 
                                pitch: 60, 
                                essential: true 
                            });

                            // Update or Add Marker
                            if (window.userMarker) {
                                window.userMarker.setLngLat([longitude, latitude]);
                            } else {
                                window.userMarker = new maplibregl.Marker({ color: '#4A90E2' })
                                    .setLngLat([longitude, latitude])
                                    .addTo(mapInstance.current);
                            }
                        }
                        
                        fetchPlaygrounds(latitude, longitude);
                        setLoading(false);
                    },
                    (err) => {
                        console.error('Location Error', err);
                        setLoading(false);
                        if (err.code === 1) {
                            setLocationError("Standortzugriff verweigert. Bitte in den Browsereinstellungen erlauben.");
                        } else if (isFirstLoad) {
                            // On first load, if High Accuracy fails/times out, try once more with default
                            navigator.geolocation.getCurrentPosition(
                                (pos) => {
                                    const { longitude, latitude } = pos.coords;
                                    setUserLocation([longitude, latitude]);
                                    mapInstance.current.flyTo({ center: [longitude, latitude], zoom: 14 });
                                    fetchPlaygrounds(latitude, longitude);
                                },
                                () => setLocationError("Standort konnte nicht ermittelt werden.")
                            );
                        } else {
                            setLocationError("Standort konnte nicht ermittelt werden (Timeout oder Signalverlust).");
                        }
                    },
                    options
                );
            };

            useEffect(() => {
                db.auth.getSession().then(({ data: { session } }) => setUser(session?.user ?? null));
                const { data: { subscription } } = db.auth.onAuthStateChange((_event, session) => setUser(session?.user ?? null));

                if (!mapInstance.current) {
                    mapInstance.current = new maplibregl.Map({
                        container: 'map',
                        style: 'https://tiles.openfreemap.org/styles/bright',
                        center: [10.4515, 51.1657], // Center of DE
                        zoom: 6,
                        pitch: 45,
                        antialias: true
                    });

                    mapInstance.current.on('load', () => {
                        // Add 3D buildings
                        mapInstance.current.addLayer({
                            'id': '3d-buildings',
                            'source': 'openmaptiles',
                            'source-layer': 'building',
                            'type': 'fill-extrusion',
                            'minzoom': 15,
                            'paint': {
                                'fill-extrusion-color': '#aaa',
                                'fill-extrusion-height': ['get', 'render_height'],
                                'fill-extrusion-base': ['get', 'render_min_height'],
                                'fill-extrusion-opacity': 0.6
                            }
                        });

                        detectLocation(true);
                    });
                }

                if (window.lucide) window.lucide.createIcons();
                return () => subscription.unsubscribe();
            }, []);

            const fetchPhotos = async (playgroundId) => {
                const { data, error } = await db.from('playground_photos').select('*').eq('playground_id', playgroundId);
                if (!error) setPlaygroundPhotos(data);
            };

            const uploadPhoto = async (e) => {
                const file = e.target.files[0];
                if (!file || !user || !selectedPlayground) return;

                setLoading(true);
                const fileExt = file.name.split('.').pop();
                const fileName = `${selectedPlayground.id}-${Math.random()}.${fileExt}`;
                const { data, error } = await db.storage.from('playground-photos').upload(fileName, file);

                if (data) {
                    const { data: { publicUrl } } = db.storage.from('playground-photos').getPublicUrl(fileName);
                    await db.from('playground_photos').insert({
                        playground_id: String(selectedPlayground.id),
                        url: publicUrl,
                        user_id: user.id
                    });
                    fetchPhotos(selectedPlayground.id);
                }
                setLoading(false);
            };

            const fetchPlaygrounds = async (lat, lng) => {
                setLoading(true);
                const radius = 5000;
                const query = `[out:json];(node["leisure"="playground"](around:${radius},${lat},${lng}););out center;`;

                try {
                    const response = await fetch('https://overpass-api.de/api/interpreter', { method: 'POST', body: query });
                    const data = await response.json();

                    data.elements.forEach(element => {
                        const lngLat = element.center ? [element.center.lon, element.center.lat] : [element.lon, element.lat];
                        const el = document.createElement('div');
                        el.className = 'marker-container';
                        el.innerHTML = '<div class="marker-icon"><i data-lucide="map-pin"></i></div>';

                        new maplibregl.Marker({ element: el }).setLngLat(lngLat).addTo(mapInstance.current);

                        el.addEventListener('click', () => {
                            setSelectedPlayground({ ...element.tags, id: element.id, lat: lngLat[1], lng: lngLat[0] });
                            setDirections(null);
                            fetchPhotos(element.id);
                        });
                    });
                    if (window.lucide) window.lucide.createIcons();
                } catch (err) { console.error(err); }
                finally { setLoading(false); }
            };

            const getDirections = async (mode) => {
                if (!selectedPlayground || !userLocation) return;
                setLoading(true);
                const profile = mode === 'walk' ? 'foot-walking' : mode === 'bike' ? 'cycling-regular' : 'driving-car';
                const start = `${userLocation[0]},${userLocation[1]}`;
                const end = `${selectedPlayground.lng},${selectedPlayground.lat}`;

                try {
                    const response = await fetch(`https://api.openrouteservice.org/v2/directions/${profile}?api_key=${ORS_API_KEY}&start=${start}&end=${end}`);
                    if (!response.ok) throw new Error('ORS API Error');
                    const data = await response.json();
                    const coords = data.features[0].geometry.coordinates;
                    const steps = data.features[0].properties.segments[0].steps;
                    setDirections(steps);

                    if (mapInstance.current.getSource('route')) {
                        mapInstance.current.getSource('route').setData(data.features[0].geometry);
                    } else {
                        mapInstance.current.addSource('route', { 'type': 'geojson', 'data': data.features[0].geometry });
                        mapInstance.current.addLayer({ 'id': 'route', 'type': 'line', 'source': 'route', 'layout': { 'line-join': 'round', 'line-cap': 'round' }, 'paint': { 'line-color': '#4A90E2', 'line-width': 6, 'line-opacity': 0.8 } });
                    }
                    const bounds = coords.reduce((acc, coord) => acc.extend(coord), new maplibregl.LngLatBounds(coords[0], coords[0]));
                    mapInstance.current.fitBounds(bounds, { padding: 50 });
                } catch (err) {
                    alert('Google Maps fallback.');
                    const googleMode = mode === 'car' ? 'driving' : mode === 'bike' ? 'bicycling' : 'walking';
                    window.open(`https://www.google.com/maps/dir/?api=1&destination=${selectedPlayground.lat},${selectedPlayground.lng}&travelmode=${googleMode}`, '_blank');
                } finally { setLoading(false); }
            };

            const handleNavigate = (mode) => {
                if (mode === 'pt') window.open(`https://www.google.com/maps/dir/?api=1&destination=${selectedPlayground.lat},${selectedPlayground.lng}&travelmode=transit`, '_blank');
                else getDirections(mode);
            };

            return (
                <div className="app-container">
                    {showAuth && <AuthModal onClose={() => setShowAuth(false)} />}
                    <header className="header">
                        <div className="logo">Spielplatz <span>Entdecker</span></div>
                        <div className="user-menu" onClick={() => !user ? setShowAuth(true) : db.auth.signOut()}>
                            <i data-lucide={user ? "log-out" : "user"}></i>
                        </div>
                    </header>

                    <div id="map"></div>

                    {locationError && (
                        <div className="location-error-notice" style={{ position: 'fixed', bottom: '100px', left: '20px', right: '20px', zIndex: 500, background: 'rgba(255, 255, 255, 0.9)', padding: '12px 20px', borderRadius: '16px', boxShadow: '0 8px 32px rgba(0,0,0,0.1)', display: 'flex', alignItems: 'center', gap: '12px', border: '1px solid #FFEDEB' }}>
                            <i data-lucide="alert-triangle" style={{ color: '#E74C3C' }}></i>
                            <span style={{ fontSize: '0.9rem', color: '#666' }}>{locationError}</span>
                            <button onClick={() => setLocationError(null)} style={{ border: 'none', background: 'none', marginLeft: 'auto', cursor: 'pointer', color: '#999' }}>×</button>
                        </div>
                    )}

                    <div className="fab-container">
                        <button className="fab secondary" onClick={() => detectLocation()} title="Mein Standort"><i data-lucide="crosshair"></i></button>
                        <button className="fab" onClick={() => userLocation && fetchPlaygrounds(userLocation[1], userLocation[0])} title="Spielplätze suchen"><i data-lucide="refresh-cw"></i></button>
                    </div>

                    <div className={`playground-drawer ${selectedPlayground ? 'open' : ''}`}>
                        <div className="drawer-handle" onClick={() => setSelectedPlayground(null)}></div>
                        {selectedPlayground && (
                            <div className="drawer-content">
                                <h2 className="playground-title">{selectedPlayground.name || 'Spielplatz'}</h2>
                                <div className="playground-tags">
                                    {selectedPlayground.surface && <span className="tag">{selectedPlayground.surface}</span>}
                                    <span className="tag">Öffentlich</span>
                                </div>

                                {playgroundPhotos.length > 0 && (
                                    <div className="photo-gallery mb-2" style={{ display: 'flex', gap: '8px', overflowX: 'auto', paddingBottom: '8px' }}>
                                        {playgroundPhotos.map(p => (
                                            <img key={p.id} src={p.url} style={{ height: '120px', borderRadius: '12px' }} />
                                        ))}
                                    </div>
                                )}

                                {directions ? (
                                    <div className="directions-list mt-4">
                                        <h3 className="mb-2">Anfahrt</h3>
                                        <div style={{ maxHeight: '200px', overflowY: 'auto' }}>
                                            {directions.map((step, i) => (
                                                <div key={i} className="direction-step mb-2" style={{ borderBottom: '1px solid #eee', paddingBottom: '4px' }}>
                                                    {i + 1}. {step.instruction} ({Math.round(step.distance)}m)
                                                </div>
                                            ))}
                                        </div>
                                        <button className="btn btn-secondary mt-2" style={{ width: '100%' }} onClick={() => setDirections(null)}>Route löschen</button>
                                    </div>
                                ) : (
                                    <>
                                        <div className="playground-info">
                                            <p className="mb-2"><strong>Ausstattung:</strong> {selectedPlayground.playground || 'Schaukel, Rutsche, Sandkasten'}</p>
                                        </div>

                                        <div className="btn-group">
                                            <button className="btn btn-secondary" onClick={() => handleNavigate('walk')}><i data-lucide="footprints"></i> Lauf</button>
                                            <button className="btn btn-secondary" onClick={() => handleNavigate('bike')}><i data-lucide="bike"></i> Rad</button>
                                            <button className="btn btn-secondary" onClick={() => handleNavigate('car')}><i data-lucide="car"></i> Auto</button>
                                            <button className="btn btn-primary" onClick={() => handleNavigate('pt')}><i data-lucide="bus"></i> ÖPNV</button>
                                        </div>
                                        <div className="mt-4">
                                            {user ? (
                                                <div className="btn btn-secondary" style={{ width: '100%', position: 'relative', overflow: 'hidden' }}>
                                                    <i data-lucide="camera"></i> Foto hochladen
                                                    <input type="file" onChange={uploadPhoto} style={{ position: 'absolute', opacity: 0, left: 0, top: 0, width: '100%', height: '100%' }} />
                                                </div>
                                            ) : (
                                                <button className="btn btn-secondary" style={{ width: '100%' }} onClick={() => setShowAuth(true)}>
                                                    <i data-lucide="user"></i> Login für Foto-Upload
                                                </button>
                                            )}
                                        </div>
                                    </>
                                )}
                            </div>
                        )}
                    </div>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
